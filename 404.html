<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Not Found</title>
  <style>
    body {
      margin: 0;
      background: #faf9f5;
      color: #1a1a18;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
    }
    .page-shell {
      width: min(1100px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 48px 0 96px;
    }
    .hero {
      padding: 10px 0 28px;
      border-bottom: 1px solid #ddd8cb;
      margin-bottom: 36px;
    }
    .eyebrow {
      font: 12px ui-monospace, "SF Mono", Menlo, Monaco, monospace;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #6f6d67;
    }
    h1 {
      font-family: ui-serif, Georgia, "Times New Roman", serif;
      font-size: clamp(34px, 6vw, 58px);
      line-height: 1.02;
      font-weight: 500;
      margin: 10px 0 12px;
    }
    .dek {
      max-width: 760px;
      font-size: 18px;
      color: #6f6d67;
    }
    a {
      color: #4d6f97;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    @media (max-width: 760px) {
      .page-shell {
        width: min(100vw - 24px, 1100px);
        padding-top: 28px;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <p class="eyebrow">404</p>
      <h1>Page not found</h1>
      <p class="dek">The note or page you requested does not exist in the public archive.</p>
      <p><a href="/research-blog/">Return to homepage</a></p>
    </section>
  </main>
</body>
</html>
